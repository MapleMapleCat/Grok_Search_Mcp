name: Deployment contract

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compose-publication:
    name: Preserve Compose publication
    runs-on: ubuntu-latest

    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify deployment contract
        run: go test ./test/deploy
